<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree Fan Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>window.jsPDF = window.jspdf.jsPDF;</script>
<script src="https://cdn.jsdelivr.net/npm/svg2pdf.js@2.2.3/dist/svg2pdf.umd.min.js"></script>
<script>
  window.addEventListener('load', () => {
    if (!window.jspdf) console.error("jsPDF failed to load");
    else if (!window.jspdf.jsPDF.API.svg) console.warn("svg2pdf failed to attach to jsPDF");
    else console.log("PDF export libraries loaded correctly");
  });
</script>
<style>
:root {
  --bg: #f5f0ea;
  --bg2: #ffffff;
  --bg3: #ede8e0;
  --fg: #1a1208;
  --fg2: #6a5840;
  --accent: #b07018;
  --accent2: #8a5210;
  --border: #d0c8bc;
  --radius: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans', sans-serif;
  background: var(--bg);
  color: var(--fg);
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== TOOLBAR ===== */
#toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  z-index: 10;
}
#toolbar .group {
  display: flex;
  align-items: center;
  gap: 6px;
}
#toolbar label {
  font-size: 12px;
  color: var(--fg2);
  white-space: nowrap;
}
#toolbar .sep {
  width: 1px;
  height: 28px;
  background: var(--border);
  margin: 0 4px;
}

/* Buttons */
.btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 5px 14px;
  border-radius: var(--radius);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, border-color 0.15s;
}
.btn:hover { background: #e0d8cc; border-color: var(--accent); }
.btn.primary { background: var(--accent); color: #ffffff; border-color: var(--accent); font-weight: 600; }
.btn.primary:hover { background: var(--accent2); }

/* Radio group */
.radio-group {
  display: flex;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.radio-group label {
  padding: 4px 12px;
  font-size: 12px;
  cursor: pointer;
  color: var(--fg2);
  background: var(--bg3);
  border-right: 1px solid var(--border);
  transition: all 0.15s;
}
.radio-group label:last-child { border-right: none; }
.radio-group input { display: none; }
.radio-group input:checked + span {
  color: var(--accent2);
  font-weight: 600;
}
.radio-group label:has(input:checked) {
  background: #fff0d8;
}

/* Root selector */
.root-selector {
  position: relative;
}
#person-search {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 5px 10px;
  border-radius: var(--radius);
  font-size: 12px;
  font-family: inherit;
  width: 300px;
  outline: none;
}
#person-search:focus { border-color: var(--accent); }
#person-search::placeholder { color: #b0a898; }

#person-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  width: 380px;
  max-height: 320px;
  overflow-y: auto;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  margin-top: 2px;
}
#person-dropdown .item {
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  border-bottom: 1px solid #e8e0d8;
  display: flex;
  justify-content: space-between;
}
#person-dropdown .item:hover { background: #f0e8d8; }
#person-dropdown .item .id { color: #a09080; font-size: 11px; }
#person-dropdown .item.active { background: var(--accent); color: #ffffff; }
#person-dropdown .item.active .id { color: #7a5828; }

/* Gen slider */
#gen-slider {
  width: 80px;
  accent-color: var(--accent);
}
#gen-value {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent2);
  min-width: 20px;
  text-align: center;
}

/* Export dropdown */
.export-wrap { position: relative; }
#export-menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  margin-top: 4px;
  z-index: 100;
  min-width: 120px;
}
#export-menu .item {
  padding: 8px 16px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}
#export-menu .item:hover { background: #f0e8d8; }

/* ===== CANVAS ===== */
#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
  background-color: #ffffff;
  border: 1px solid var(--border);
}
#canvas-container:active { cursor: grabbing; }
#chart-host svg {
  display: block;
  position: absolute;
  top: 0; left: 0;
  user-select: none;
  -webkit-user-drag: none;
}

/* ===== TOOLTIP ===== */
#tooltip {
  display: none;
  position: fixed;
  background: #fffdf8;
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 12px;
  line-height: 1.5;
  pointer-events: none;
  z-index: 200;
  max-width: 280px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
}
#tooltip strong { color: var(--accent2); font-size: 13px; }
#tooltip .gen-badge {
  display: inline-block;
  background: var(--accent);
  color: #ffffff;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 6px;
}

/* ===== STATUS BAR ===== */
#status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 16px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--fg2);
}

/* ===== UPLOAD OVERLAY ===== */
#upload-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(245,240,234,0.95);
  z-index: 50;
}
#upload-overlay.hidden { display: none; }
#drop-zone {
  width: 400px;
  padding: 60px 40px;
  border: 2px dashed #c0b0a0;
  border-radius: 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
#drop-zone:hover, #drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(176,112,24,0.06);
}
#drop-zone h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--accent2);
}
#drop-zone p { font-size: 13px; color: var(--fg2); }
#drop-zone .icon { font-size: 48px; margin-bottom: 16px; display: block; }
#file-input { display: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #c0b0a0; border-radius: 3px; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="group">
    <button class="btn" id="open-btn" title="Open GEDCOM file">📁 Open .ged</button>
    <input type="file" id="file-input" accept=".ged">
  </div>
  <div class="sep"></div>
  <div class="group">
    <label>Root:</label>
    <div class="root-selector">
      <input type="text" id="person-search" placeholder="Load a GEDCOM file first…" disabled>
      <div id="person-dropdown"></div>
    </div>
  </div>
  <div class="group">
    <label>Gen:</label>
    <input type="range" id="gen-slider" min="1" max="20" value="12" disabled>
    <span id="gen-value">12</span>
  </div>
  <div class="sep"></div>
  <div class="group">
    <label>Fan:</label>
    <div class="radio-group">
      <label><input type="radio" name="fan" value="180"><span>180°</span></label>
      <label><input type="radio" name="fan" value="270"><span>270°</span></label>
      <label><input type="radio" name="fan" value="360" checked><span>360°</span></label>
    </div>
  </div>
  <div class="sep"></div>
  <div class="row-wrap" style="display: flex; align-items: center; gap: 12px;">
    <div class="group">
      <label>Palette:</label>
      <select id="palette-select" class="btn" style="padding-right: 24px; min-width: 180px;">
        <!-- Options will be populated by JS -->
      </select>
    </div>
    <div class="sep"></div>
    <div class="group export-wrap">
    <button class="btn" id="export-btn" disabled>📥 Export</button>
    <div id="export-menu">
      <div class="item" data-fmt="svg">Download SVG</div>
      <div class="item" data-fmt="png">Download PNG (300 DPI)</div>
      <div class="item" data-fmt="pdf">Download PDF</div>
    </div>
  </div>
</div>
</div>

<!-- CANVAS -->
<div id="canvas-container">
  <div id="chart-host"></div>
  <div id="upload-overlay">
    <div id="drop-zone">
      <span class="icon">🌳</span>
      <h2>Drag & Drop GEDCOM File</h2>
      <p>or click to browse (.ged files)</p>
    </div>
  </div>
</div>

<!-- TOOLTIP -->
<div id="tooltip"></div>

<!-- STATUS BAR -->
<div id="status-bar">
  <span id="status-left">Load a .ged file to begin</span>
  <span id="status-right"></span>
</div>


<script src="gen-svg.js?v=15"></script>

<script>
  // This "glue" code ensures the HTML elements talk to your JS file
  document.addEventListener('DOMContentLoaded', () => {
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const openBtn = document.getElementById('open-btn');

    // Trigger file browser
    openBtn.onclick = () => fileInput.click();
    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          // This function MUST exist inside gen-svg.js
          if (typeof initChart === 'function') {
            initChart(event.target.result);
            document.getElementById('upload-overlay').classList.add('hidden');
          } else {
            console.error("Function 'initChart' not found in gen-svg.js");
          }
        };
        reader.readAsText(file);
      }
    };

    // Update Gen display
    const slider = document.getElementById('gen-slider');
    slider.oninput = () => {
      document.getElementById('gen-value').textContent = slider.value;
    };
  });
</script>
</body>
</html>
