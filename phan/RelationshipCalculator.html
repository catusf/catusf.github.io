<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quan hệ Gia phả</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Sans+Mono:wght@400;500&display=swap');

  :root {
    --ink:       #1a1410;
    --paper:     #f5f0e8;
    --aged:      #e8dfc8;
    --sepia:     #c8a96e;
    --rust:      #8b3a2a;
    --moss:      #3d5a3e;
    --sky:       #2a4a6b;
    --warn:      #7a5c1e;
    --warn-bg:   #fdf3d8;
    --border:    #c4b89a;
    --shadow:    rgba(26,20,16,0.12);
    --mono:      'Noto Sans Mono', monospace;
    --serif:     'Noto Sans', sans-serif;
    --sans:      'Noto Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 19px 24px 15px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(200,169,110,0.05) 20px,
      rgba(200,169,110,0.05) 21px
    );
  }
  header h1 {
    font-family: var(--serif);
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    font-weight: 600;
    letter-spacing: 0.02em;
    position: relative;
  }
  header p {
    font-size: 0.78rem;
    color: var(--sepia);
    margin-top: 4px;
    font-weight: 300;
    letter-spacing: 0.05em;
    position: relative;
  }

  /* ── LAYOUT ── */
  .container { max-width: 700px; margin: 0 auto; padding: 0 16px; }

  /* ── SECTION CARD ── */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-top: 8px;
    overflow: visible;
  }
  .card-header {
    background: var(--aged);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .icon { font-size: 1rem; }
  .card-header h2 {
    font-family: var(--serif);
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--ink);
  }
  .card-body { padding: 16px; }

  /* ── FILE UPLOAD ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--sepia);
    background: var(--aged);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
  }
  .upload-icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-zone p { font-size: 0.82rem; color: #666; }
  .upload-zone .hint { font-size: 0.72rem; color: #999; margin-top: 4px; }

  .file-loaded {
    display: flex; align-items: center; gap: 10px;
    background: #f0f7f0; border: 1px solid #b8d4b8;
    border-radius: 4px; padding: 10px 14px;
  }
  .file-loaded .file-icon { font-size: 1.2rem; }
  .file-loaded .file-info { flex: 1; min-width: 0; }
  .file-loaded .file-name { font-size: 0.85rem; font-weight: 500; color: var(--moss); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-loaded .file-stats { font-size: 0.72rem; color: #666; margin-top: 2px; }
  .btn-clear { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: #999; padding: 2px; }
  .btn-clear:hover { color: var(--rust); }

  /* ── SEARCH ── */
  .person-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .person-grid { grid-template-columns: 1fr; } }

  .person-block { position: relative; }
  .person-label {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--sepia);
    margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .person-label .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    font-size: 0.65rem; font-weight: 700; color: #fff;
  }
  .badge-a { background: var(--rust); }
  .badge-b { background: var(--sky); }

  .search-input-wrap { position: relative; }
  .search-input {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 4px; font-family: var(--sans);
    font-size: 0.85rem; background: #fff;
    transition: border-color 0.15s;
    color: var(--ink);
  }
  .search-input:focus { outline: none; border-color: var(--sepia); }
  .search-input:disabled { background: var(--aged); color: #999; }
  .search-input-wrap .btn-clear-search {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: #bbb; font-size: 1rem; line-height: 1; padding: 2px 4px;
    display: none;
  }
  .search-input-wrap .btn-clear-search:hover { color: var(--rust); }
  .search-input-wrap .btn-clear-search.visible { display: block; }
  .search-input { padding-right: 28px; }

  .selected-tag {
    display: flex; align-items: center; gap: 6px;
    background: var(--aged); border: 1px solid var(--border);
    border-radius: 4px; padding: 7px 10px;
    font-size: 0.82rem;
  }
  .selected-tag .tag-name { flex: 1; font-weight: 500; }
  .selected-tag .tag-meta { font-size: 0.7rem; color: #888; }
  .tag-a { border-left: 3px solid var(--rust); }
  .tag-b { border-left: 3px solid var(--sky); }
  .btn-deselect { background: none; border: none; cursor: pointer; color: #aaa; font-size: 0.9rem; padding: 0 2px; }
  .btn-deselect:hover { color: var(--rust); }

  /* ── DROPDOWN ── */
  .dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #fff; border: 1px solid var(--border);
    border-radius: 4px; box-shadow: 0 6px 20px var(--shadow);
    z-index: 100; max-height: 240px; overflow-y: auto;
    display: none;
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 9px 12px; cursor: pointer;
    font-size: 0.83rem; border-bottom: 1px solid #f0ebe0;
    transition: background 0.1s;
    display: flex; align-items: baseline; gap: 8px;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--aged); }
  .dropdown-item .item-name { font-weight: 500; flex: 1; }
  .dropdown-item .item-meta { font-size: 0.7rem; color: #999; font-family: var(--mono); }
  .dropdown-cap {
    padding: 7px 12px; font-size: 0.72rem; color: var(--warn);
    background: var(--warn-bg); border-top: 1px solid #e8d89a;
    font-style: italic;
  }
  .dropdown-empty { padding: 12px; text-align: center; color: #aaa; font-size: 0.8rem; }
  .dropdown-item.kb-active { background: var(--aged); outline: 2px solid var(--sepia); outline-offset: -2px; }
  .lca-sep { color: var(--sepia); font-weight: 700; margin: 0 4px; }

  /* ── RESULT ── */
  .result-pending {
    text-align: center; padding: 24px 16px;
    color: #bbb; font-size: 0.85rem; font-style: italic;
  }

  .relation-display {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  @media (max-width: 400px) { .relation-display { grid-template-columns: 1fr; } }

  .relation-box {
    border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden;
  }
  .relation-box .rbox-header {
    padding: 6px 12px; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
  }
  .rbox-a .rbox-header { background: #fdf0ed; color: var(--rust); border-bottom: 1px solid #f0c8be; }
  .rbox-b .rbox-header { background: #edf3fa; color: var(--sky); border-bottom: 1px solid #b8d0e8; }
  .relation-box .rbox-body { padding: 14px 12px; }
  .relation-box .rbox-arrow {
    font-size: 0.72rem; color: #aaa; margin-bottom: 4px;
  }
  .relation-box .rbox-label {
    font-family: var(--serif); font-size: 1.6rem;
    font-weight: 600; color: var(--ink); line-height: 1.1;
  }
  .relation-box .rbox-label.unknown { color: #bbb; font-style: italic; }
  .relation-box .rbox-label.combined { font-size: 1.1rem; color: #666; }

  /* ── ANCESTOR + PATH ── */
  .lca-block {
    margin-top: 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .lca-header {
    background: var(--aged);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #888;
  }
  .lca-name {
    padding: 10px 14px 6px;
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--ink);
  }
  .lca-name .lca-id {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 400;
    color: #999;
    margin-left: 5px;
  }
  .lca-paths {
    padding: 6px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .path-row { display: flex; flex-direction: column; gap: 3px; }
  .path-badge {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: #fff; padding: 1px 5px;
    border-radius: 3px; display: inline-block; margin-bottom: 2px;
  }
  .path-badge-a { background: var(--rust); }
  .path-badge-b { background: var(--sky); }
  .path-chain {
    font-size: 0.78rem;
    line-height: 1.6;
    color: var(--ink);
    word-break: break-word;
  }
  .path-node { white-space: nowrap; }
  .path-node a {
    color: inherit; text-decoration: none;
    border-bottom: 1px dashed var(--sepia);
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .path-node a:hover { color: var(--rust); border-color: var(--rust); }
  .path-node .nid {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: #aaa;
    margin-left: 2px;
  }
  .path-sep {
    color: var(--sepia);
    font-weight: 700;
    margin: 0 4px;
  }
  .path-end { font-weight: 600; }
  .child-order {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--ink);
    font-weight: 500;
  }

  /* ── WARNINGS ── */
  .warning-banner {
    background: var(--warn-bg); border: 1px solid #e8d89a;
    border-radius: 4px; padding: 10px 14px; margin-bottom: 12px;
  }
  .warning-banner .warn-title {
    font-size: 0.72rem; font-weight: 600; color: var(--warn);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .warning-banner ul { list-style: none; }
  .warning-banner li {
    font-size: 0.75rem; color: var(--warn); padding: 1px 0;
    padding-left: 14px; position: relative;
  }
  .warning-banner li::before {
    content: '⚠'; position: absolute; left: 0; font-size: 0.65rem;
  }

  /* ── DEBUG ── */
  .debug-toggle {
    background: none; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 0.78rem; color: #888;
    display: flex; align-items: center; gap: 5px;
    padding: 0; margin-top: 12px; text-decoration: underline;
    text-underline-offset: 3px;
  }
  .debug-toggle:hover { color: var(--ink); }

  .debug-panel {
    margin-top: 12px; display: none;
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  }
  .debug-panel.open { display: block; }
  .debug-toolbar {
    background: var(--aged); border-bottom: 1px solid var(--border);
    padding: 6px 12px; display: flex; align-items: center; gap: 8px;
  }
  .debug-toolbar span { font-size: 0.72rem; color: #888; font-family: var(--mono); flex: 1; }
  .btn-copy {
    background: none; border: 1px solid var(--border);
    border-radius: 3px; padding: 3px 8px;
    font-size: 0.7rem; cursor: pointer; color: #666;
    font-family: var(--sans);
  }
  .btn-copy:hover { background: #fff; }

  pre.debug-json {
    padding: 14px; font-family: var(--mono);
    font-size: 0.72rem; line-height: 1.6;
    overflow-x: auto; background: #1a1410;
    color: #c8b896; max-height: 400px; overflow-y: auto;
  }
  .json-key    { color: #e8c882; }
  .json-str    { color: #98c888; }
  .json-num    { color: #88b8e8; }
  .json-bool   { color: #e8988a; }
  .json-null   { color: #888; }

  /* ── LOADING ── */
  .loading-bar {
    height: 3px; background: var(--aged);
    position: relative; overflow: hidden; border-radius: 2px;
    margin-bottom: 8px; display: none;
  }
  .loading-bar.active { display: block; }
  .loading-bar::after {
    content: ''; position: absolute;
    top: 0; left: -60%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--sepia), transparent);
    animation: loadslide 1s infinite;
  }
  @keyframes loadslide { to { left: 160%; } }

  .error-msg {
    background: #fdf0ed; border: 1px solid #f0c8be;
    border-radius: 4px; padding: 10px 14px;
    font-size: 0.8rem; color: var(--rust);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--aged); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── URL LOAD ── */
  .url-load-container {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .url-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.82rem;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input:focus { border-color: var(--sepia); }
  .btn-load-url {
    background: var(--sepia);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 0 16px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-load-url:hover { background: var(--rust); }
</style>
</head>
<body>

<header>
  <h1>🌿 Quan hệ Gia phả</h1>
  <p>Xưng hô thế nào</p>
</header>

<div class="container">

  <!-- FILE UPLOAD -->
  <div class="card">
    <div class="card-body">
      <div class="loading-bar" id="loadingBar"></div>
      <div id="uploadArea">
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept=".ged,.gedcom">
          <div class="upload-icon">📜</div>
          <p>Kéo thả file <strong>.ged</strong> vào đây, hoặc click để chọn</p>
          <p class="hint">UTF-8 · GEDCOM 5.5 / 5.5.1</p>
        </div>
        <div class="url-load-container">
          <input type="text" id="urlInput" class="url-input" placeholder="Hoặc nhập URL file .ged (https://...)">
          <button id="btnLoadUrl" class="btn-load-url">Tải URL</button>
        </div>
      </div>
      <div id="fileLoaded" style="display:none"></div>
      <div id="fileError" style="display:none"></div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="card">
    <div class="card-body">
      <div class="person-grid">
        <div class="person-block">
          <div class="person-label">
            <span class="badge badge-a">A</span> Người thứ nhất
          </div>
          <div id="personA_input">
            <div class="search-input-wrap">
              <input type="text" class="search-input" id="searchA" placeholder="Nhập tên... (≥2 ký tự)" disabled autocomplete="off">
              <button class="btn-clear-search" id="clearSearchA" tabindex="-1">✕</button>
              <div class="dropdown" id="dropdownA"></div>
            </div>
          </div>
          <div id="personA_tag" style="display:none"></div>
        </div>
        <div class="person-block">
          <div class="person-label">
            <span class="badge badge-b">B</span> Người thứ hai
          </div>
          <div id="personB_input">
            <div class="search-input-wrap">
              <input type="text" class="search-input" id="searchB" placeholder="Nhập tên... (≥2 ký tự)" disabled autocomplete="off">
              <button class="btn-clear-search" id="clearSearchB" tabindex="-1">✕</button>
              <div class="dropdown" id="dropdownB"></div>
            </div>
          </div>
          <div id="personB_tag" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="card">
    <div class="card-body">
      <div id="resultArea">
        <div class="result-pending">Chọn hai người để xem quan hệ</div>
      </div>
      <button class="debug-toggle" id="debugToggle" style="display:none">
        <span id="debugArrow">▶</span> Xem debug
      </button>
      <div class="debug-panel" id="debugPanel">
        <div class="debug-toolbar">
          <span id="debugLabel">debug output</span>
          <button class="btn-copy" id="btnCopy">Copy JSON</button>
        </div>
        <pre class="debug-json" id="debugJson"></pre>
      </div>
    </div>
  </div>

</div>

<script src="relationship-logic.js"></script>
<script>
// ════════════════════════════════════════════════════════════
// 6. JSON SYNTAX HIGHLIGHT
// ════════════════════════════════════════════════════════════
function highlightJSON(obj) {
  const json = JSON.stringify(obj, null, 2);
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    let cls = 'json-num';
    if (/^"/.test(match)) {
      cls = /:$/.test(match) ? 'json-key' : 'json-str';
    } else if (/true|false/.test(match)) {
      cls = 'json-bool';
    } else if (/null/.test(match)) {
      cls = 'json-null';
    }
    return `<span class="${cls}">${match}</span>`;
  });
}

// ════════════════════════════════════════════════════════════
// 7. UI CONTROLLER
// ════════════════════════════════════════════════════════════
let INDEX = null;
let selectedA = null, selectedB = null;
let loadedUrl = null; 
let lastDebugObj = null;
let searchTimers = {};

function initUI() {
  // File input
  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

  // Search inputs + dropdown click delegation (attached once here, never re-attached)
  ['A', 'B'].forEach(side => {
    const input = document.getElementById(`search${side}`);
    const dd    = document.getElementById(`dropdown${side}`);

    input.addEventListener('input', () => {
      clearTimeout(searchTimers[side]);
      searchTimers[side] = setTimeout(() => doSearch(side), 200);
    });
    input.addEventListener('focus', () => { if (input.value.length >= 2) doSearch(side); });

    // Keyboard navigation: ArrowUp / ArrowDown / Enter
    input.addEventListener('keydown', function(e) {
      if (!dd.classList.contains('open')) return;
      var items = Array.from(dd.querySelectorAll('.dropdown-item'));
      if (!items.length) return;
      var active = dd.querySelector('.dropdown-item.kb-active');
      var idx = active ? items.indexOf(active) : -1;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (active) active.classList.remove('kb-active');
        idx = (idx + 1) % items.length;
        items[idx].classList.add('kb-active');
        items[idx].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (active) active.classList.remove('kb-active');
        idx = (idx - 1 + items.length) % items.length;
        items[idx].classList.add('kb-active');
        items[idx].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        if (active) {
          e.preventDefault();
          selectPerson(active.dataset.side, active.dataset.id);
        }
      } else if (e.key === 'Escape') {
        dd.classList.remove('open');
      }
    });

    // Single persistent delegated click listener on the dropdown container
    dd.addEventListener('click', function(e) {
      const item = e.target.closest('.dropdown-item');
      if (!item) return;
      e.stopPropagation();
      selectPerson(item.dataset.side, item.dataset.id);
    });

    // Clear button
    var clearBtn = document.getElementById('clearSearch' + side);
    if (clearBtn) {
      clearBtn.addEventListener('mousedown', function(e) {
        e.preventDefault(); // don't blur input
        input.value = '';
        clearBtn.classList.remove('visible');
        dd.classList.remove('open');
      });
    }

    // Show/hide clear button
    input.addEventListener('input', function() {
      if (clearBtn) clearBtn.classList.toggle('visible', input.value.length > 0);
    });

    // Close dropdown on outside click
    document.addEventListener('click', e => {
      if (!input.contains(e.target) && !dd.contains(e.target)) dd.classList.remove('open');
    });
  });

  // Path node hyperlinks — delegated on result area
  document.getElementById('resultArea').addEventListener('click', function(e) {
    var link = e.target.closest('.path-link');
    if (!link) return;
    e.preventDefault();
    var side = link.dataset.side;
    var id   = link.dataset.id;
    if (side && id && INDEX) selectPerson(side, id);
  });

  // Debug toggle
  document.getElementById('debugToggle').addEventListener('click', () => {
    const panel = document.getElementById('debugPanel');
    const arrow = document.getElementById('debugArrow');
    const isOpen = panel.classList.toggle('open');
    arrow.textContent = isOpen ? '▼' : '▶';
  });

  // Copy JSON
  document.getElementById('btnCopy').addEventListener('click', () => {
    if (!lastDebugObj) return;
    navigator.clipboard.writeText(JSON.stringify(lastDebugObj, null, 2))
      .then(() => { document.getElementById('btnCopy').textContent = 'Đã copy!'; setTimeout(() => document.getElementById('btnCopy').textContent = 'Copy JSON', 1500); });
  });

  // URL load button
  document.getElementById('btnLoadUrl').addEventListener('click', () => {
    loadFromUrl(document.getElementById('urlInput').value.trim());
  });
  document.getElementById('urlInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') loadFromUrl(document.getElementById('urlInput').value.trim());
  });

  // Check for url param
  const urlParams = new URLSearchParams(window.location.search);
  const gedUrl = urlParams.get('url');
  if (gedUrl) loadFromUrl(gedUrl);
}

function loadFile(file) {
  const bar = document.getElementById('loadingBar');
  const errDiv = document.getElementById('fileError');
  bar.classList.add('active');
  errDiv.style.display = 'none';

  const reader = new FileReader();
  reader.onload = e => initGedcom(e.target.result, file.name);
  reader.onerror = () => {
    bar.classList.remove('active');
    errDiv.innerHTML = `<div class="error-msg">❌ Không đọc được file</div>`;
    errDiv.style.display = 'block';
  };
  reader.readAsText(file, 'UTF-8');
}

function loadFromUrl(url) {
  if (!url) return;
  const bar = document.getElementById('loadingBar');
  const errDiv = document.getElementById('fileError');
  bar.classList.add('active');
  errDiv.style.display = 'none';

  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.text();
    })
    .then(text => {
      const fileName = url.split('/').pop().split('?')[0] || 'remote_file.ged';
      loadedUrl = url;
      initGedcom(text, fileName);
    })
    .catch(err => {
      bar.classList.remove('active');
      errDiv.style.display = 'block';
      errDiv.innerHTML = `<div class="error-msg">❌ Lỗi tải từ URL: ${escHtml(err.message)}. <br><small>Có thể do lỗi CORS (máy chủ từ xa không cho phép tải trực tiếp).</small></div>`;
    });
}

function initGedcom(text, sourceName) {
  const bar = document.getElementById('loadingBar');
  const errDiv = document.getElementById('fileError');
  try {
    INDEX = parseGEDCOM(text);

    const count = INDEX.people.size;
    const famCount = INDEX.families.size;

    bar.classList.remove('active');
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('fileLoaded').style.display = 'block';
    document.getElementById('fileLoaded').innerHTML = `
      <div class="file-loaded">
        <span class="file-icon">✅</span>
        <div class="file-info">
          <div class="file-name">${escHtml(sourceName)}</div>
          <div class="file-stats">${count.toLocaleString()} người · ${famCount.toLocaleString()} gia đình${INDEX.warnings.length > 0 ? ' · ⚠ ' + INDEX.warnings.length + ' cảnh báo' : ''}</div>
        </div>
        <button class="btn-clear" title="Tải file khác" onclick="resetFile()">✕</button>
      </div>
      ${INDEX.warnings.map(w => ` ⚠ ${escHtml(w)} `).join('')}
    `;

    // Enable search
    document.getElementById('searchA').disabled = false;
    document.getElementById('searchB').disabled = false;
    document.getElementById('searchA').placeholder = 'Tìm tên... (≥2 ký tự)';
    document.getElementById('searchB').placeholder = 'Tìm tên... (≥2 ký tự)';

    // Auto-select from URL params
    const urlParams = new URLSearchParams(window.location.search);
    const wrapId = id => id ? (id.startsWith('@') ? id : `@${id}@`) : null;
    const idA = wrapId(urlParams.get('a'));
    const idB = wrapId(urlParams.get('b'));

    let autoSet = false;
    if (idA && INDEX.people.has(idA)) { selectPerson('A', idA); autoSet = true; }
    if (idB && INDEX.people.has(idB)) { selectPerson('B', idB); autoSet = true; }
    if (autoSet) syncUrl();
  } catch(err) {
    bar.classList.remove('active');
    errDiv.style.display = 'block';
    errDiv.innerHTML = `<div class="error-msg">❌ Lỗi parse file: ${escHtml(err.message)}</div>`;
  }
}

function resetFile() {
  INDEX = null; selectedA = null; selectedB = null; loadedUrl = null;
  document.getElementById('uploadArea').style.display = 'block';
  document.getElementById('fileLoaded').style.display = 'none';
  document.getElementById('fileInput').value = '';
  document.getElementById('searchA').disabled = true;
  document.getElementById('searchA').value = '';
  document.getElementById('searchB').disabled = true;
  document.getElementById('searchB').value = '';
  document.getElementById('personA_tag').style.display = 'none';
  document.getElementById('personA_input').style.display = 'block';
  document.getElementById('personB_tag').style.display = 'none';
  document.getElementById('personB_input').style.display = 'block';
  renderResult(null);
  syncUrl();
}

function doSearch(side) {
  if (!INDEX) return;
  var input = document.getElementById('search' + side);
  var dd    = document.getElementById('dropdown' + side);
  var q     = input.value.trim().toLowerCase();

  if (q.length < 2) { dd.classList.remove('open'); return; }

  var MAX = 50;
  var matches = [];
  INDEX.people.forEach(function(p) {
    if (matches.length <= MAX && p.name.toLowerCase().indexOf(q) !== -1) {
      matches.push(p);
    }
  });

  if (matches.length === 0) {
    dd.innerHTML = '<div class="dropdown-empty">Không tìm thấy</div>';
    dd.classList.add('open');
    return;
  }

  var capped = matches.slice(0, MAX);
  var html = '';
  for (var i = 0; i < capped.length; i++) {
    var p = capped[i];
    var sid = p.id; // raw id like @I506@
    html += '<div class="dropdown-item" data-id="' + sid.replace(/"/g, '&quot;') + '" data-side="' + side + '">';
    html += '<span class="item-name">' + escHtml(p.name || '(chưa đặt tên)') + '</span>';
    html += '<span class="item-meta">' + (p.sex !== 'U' ? p.sex : '?') + ' ' + (p.birthYear || '') + ' ' + escHtml(p.id) + '</span>';
    html += '</div>';
  }
  if (matches.length > MAX) {
    html += '<div class="dropdown-cap">Hiển thị 50/' + matches.length + ' — nhập thêm để lọc</div>';
  }
  dd.innerHTML = html;
  dd.classList.add('open');
}


function selectPerson(side, id) {
  console.log('selectPerson side=' + side + ' id=' + id);
  if (!INDEX) { console.warn('no INDEX'); return; }
  var p = INDEX.people.get(id);
  if (!p) {
    var alt = id.replace(/&amp;/g, '&').replace(/&quot;/g, '"');
    p = INDEX.people.get(alt);
    if (p) id = alt;
  }
  if (!p) {
    console.warn('selectPerson: not found id=' + id);
    return;
  }

  const dd = document.getElementById(`dropdown${side}`);
  dd.classList.remove('open');

  if (side === 'A') {
    selectedA = id;
    document.getElementById('personA_input').style.display = 'none';
    document.getElementById('personA_tag').style.display = 'block';
    document.getElementById('personA_tag').innerHTML = `
      <div class="selected-tag tag-a" title="Click để chọn lại" onclick="reselectPerson('A')" style="cursor:pointer">
        <span class="tag-name">${escHtml(p.name || '(chưa đặt tên)')} <span style="font-weight:400;color:#999;font-size:0.72rem;font-family:var(--mono)">${escHtml(p.id)}</span></span>
        <span class="tag-meta">${p.sex !== 'U' ? p.sex : '?'} ${p.birthYear || ''}</span>
        <button class="btn-deselect" onclick="event.stopPropagation();deselectPerson('A')" title="Bỏ chọn">✕</button>
      </div>`;
  } else {
    selectedB = id;
    document.getElementById('personB_input').style.display = 'none';
    document.getElementById('personB_tag').style.display = 'block';
    document.getElementById('personB_tag').innerHTML = `
      <div class="selected-tag tag-b" title="Click để chọn lại" onclick="reselectPerson('B')" style="cursor:pointer">
        <span class="tag-name">${escHtml(p.name || '(chưa đặt tên)')} <span style="font-weight:400;color:#999;font-size:0.72rem;font-family:var(--mono)">${escHtml(p.id)}</span></span>
        <span class="tag-meta">${p.sex !== 'U' ? p.sex : '?'} ${p.birthYear || ''}</span>
        <button class="btn-deselect" onclick="event.stopPropagation();deselectPerson('B')" title="Bỏ chọn">✕</button>
      </div>`;
  }

  syncUrl();
  if (selectedA && selectedB) runCalculation();
}

function syncUrl() {
  const p = new URLSearchParams();
  if (loadedUrl) p.set('url', loadedUrl);
  
  const cleanId = id => id ? id.replace(/^@|@$/g, '') : null;
  if (selectedA) p.set('a', cleanId(selectedA));
  if (selectedB) p.set('b', cleanId(selectedB));

  const qs = p.toString();
  const newUrl = window.location.pathname + (qs ? '?' + qs : '');
  window.history.replaceState(null, '', newUrl);
}

function reselectPerson(side) {
  const currentId = side === 'A' ? selectedA : selectedB;
  const p = currentId ? INDEX.people.get(currentId) : null;

  if (side === 'A') selectedA = null;
  else selectedB = null;

  document.getElementById(`person${side}_tag`).style.display = 'none';
  document.getElementById(`person${side}_input`).style.display = 'block';
  const input = document.getElementById(`search${side}`);
  input.value = p ? p.name : '';
  input.focus();
  if (input.value.length >= 2) doSearch(side);
  renderResult(null);
  syncUrl();
}

function deselectPerson(side) {
  if (side === 'A') {
    selectedA = null;
    document.getElementById('personA_tag').style.display = 'none';
    document.getElementById('personA_input').style.display = 'block';
    document.getElementById('searchA').value = '';
  } else {
    selectedB = null;
    document.getElementById('personB_tag').style.display = 'none';
    document.getElementById('personB_input').style.display = 'block';
    document.getElementById('searchB').value = '';
  }
  renderResult(null);
  syncUrl();
}

function runCalculation() {
  console.log('runCalculation called, A=', selectedA, 'B=', selectedB, 'INDEX=', !!INDEX);
  if (!selectedA || !selectedB || !INDEX) {
    console.warn('runCalculation: missing state');
    return;
  }
  try {
    const result = calcRelation(selectedA, selectedB, INDEX);
    console.log('calcRelation result:', result);
    lastDebugObj = result.debug;
    renderResult(result);
  } catch(err) {
    console.error('runCalculation error:', err);
    document.getElementById('resultArea').innerHTML = 
      `<div class="error-msg">❌ Lỗi tính toán: ${escHtml(err.message)}<br><small>${escHtml(err.stack||'')}</small></div>`;
  }
}

function renderResult(result) {
  var area         = document.getElementById('resultArea');
  var debugToggle  = document.getElementById('debugToggle');
  var debugPanel   = document.getElementById('debugPanel');
  var debugJson    = document.getElementById('debugJson');

  if (!result) {
    area.innerHTML = '<div class="result-pending">Chọn hai người để xem quan hệ</div>';
    debugToggle.style.display = 'none';
    debugPanel.classList.remove('open');
    document.getElementById('debugArrow').textContent = '▶';
    return;
  }

  var pA    = INDEX.people.get(selectedA);
  var pB    = INDEX.people.get(selectedB);
  var nameA = pA ? pA.name : selectedA;
  var nameB = pB ? pB.name : selectedB;

  function getChildOrder(parentId, childId) {
    var order = null;
    INDEX.families.forEach(function(fam) {
      if (fam.husb === parentId || fam.wife === parentId) {
        var idx = fam.children.indexOf(childId);
        if (idx !== -1) order = idx + 1;
      }
    });
    return order;
  }

  function renderPath(pathNodes, endLabel, side) {
    if (!pathNodes || pathNodes.length === 0) return '';
    var parts = [];
    for (var i = 0; i < pathNodes.length; i++) {
      var node = pathNodes[i];
      var nid = typeof node === 'object' ? node.id : node;
      var nm  = typeof node === 'object' ? (node.name || '(?)') : (function() {
        var p = INDEX.people.get(node); return p ? (p.name || '(?)') : node;
      })();
      var orderSuffix = '';
      if (i > 0) {
        var prevNode = pathNodes[i - 1];
        var prevId = typeof prevNode === 'object' ? prevNode.id : prevNode;
        var order = getChildOrder(prevId, nid);
        if (order !== null) orderSuffix = ' <span class="child-order">(' + order + ')</span>';
      }
      var isLast = (i === pathNodes.length - 1);
      var link;
      if (side) {
        link = '<a href="#" class="path-link" data-side="' + escHtml(side) + '" data-id="' + escHtml(nid) + '">' + escHtml(nm) + '</a>';
      } else {
        link = escHtml(nm);
      }
      parts.push('<span class="path-node' + (isLast ? ' path-end' : '') + '">' + link + orderSuffix + '</span>');
    }
    var chain = parts.join('<span class="path-sep">›</span>');
    if (endLabel) chain += '<span class="path-sep">›</span><span class="path-node path-end">' + escHtml(endLabel) + '</span>';
    return '<div class="path-chain">' + chain + '</div>';
  }

  var isUnknownA  = result.aToBLabel === 'không xác định';
  var isUnknownB  = result.bToALabel === 'không xác định';
  var labelClassA = isUnknownA ? 'rbox-label unknown' : result.aToBLabel.indexOf('/') !== -1 ? 'rbox-label combined' : 'rbox-label';
  var labelClassB = isUnknownB ? 'rbox-label unknown' : result.bToALabel.indexOf('/') !== -1 ? 'rbox-label combined' : 'rbox-label';

  var html = '';

  html += '<div class="relation-display">';
  html += '<div class="relation-box rbox-a">';
  html += '<div class="rbox-header"><span class="badge badge-a" style="width:14px;height:14px;font-size:0.6rem">A</span> ' 
        + escHtml(nameA) + ' <span style="font-size:0.65rem;font-family:var(--mono);color:#c8a96e;font-weight:400">' + escHtml(selectedA) + '</span></div>';
  html += '<div class="rbox-body">';
  html += '<div class="rbox-arrow">gọi ' + escHtml(nameB) + ' là</div>';
  html += '<div class="' + labelClassA + '">' + escHtml(result.aToBLabel) + '</div>';
  html += '</div></div>';

  html += '<div class="relation-box rbox-b">';
  html += '<div class="rbox-header"><span class="badge badge-b" style="width:14px;height:14px;font-size:0.6rem">B</span> ' 
        + escHtml(nameB) + ' <span style="font-size:0.65rem;font-family:var(--mono);color:#88b0d8;font-weight:400">' + escHtml(selectedB) + '</span></div>';
  html += '<div class="rbox-body">';
  html += '<div class="rbox-arrow">gọi ' + escHtml(nameA) + ' là</div>';
  html += '<div class="' + labelClassB + '">' + escHtml(result.bToALabel) + '</div>';
  html += '</div></div>';
  html += '</div>';

  if (result.debug && result.debug.LCAs && result.debug.LCAs.length > 0) {
    var lcas = result.debug.LCAs;
    var used = {};
    var groups = []; 
    for (var gi = 0; gi < lcas.length; gi++) {
      if (used[lcas[gi].id]) continue;
      var paired = null;
      for (var gj = gi + 1; gj < lcas.length; gj++) {
        if (used[lcas[gj].id]) continue;
        var spousesOfI = INDEX.spouses.get(lcas[gi].id) || [];
        if (spousesOfI.indexOf(lcas[gj].id) !== -1) {
          paired = lcas[gj];
          used[lcas[gj].id] = true;
          break;
        }
      }
      used[lcas[gi].id] = true;
      groups.push(paired ? [lcas[gi], paired] : [lcas[gi]]);
    }

    groups.forEach(function(group, gidx) {
      var lca  = group[0];
      var lca2 = group[1] || null;

      var lcaP    = INDEX.people.get(lca.id);
      var lcaName = lcaP ? lcaP.name : lca.id;

      html += '<div class="lca-block">';

      if (lca2) {
        var lca2P    = INDEX.people.get(lca2.id);
        var lca2Name = lca2P ? lca2P.name : lca2.id;
        html += '<div class="lca-name">'
              + escHtml(lcaName) + ' <span class="lca-id">' + escHtml(lca.id) + '</span>'
              + ' <span class="lca-sep">+</span> '
              + escHtml(lca2Name) + ' <span class="lca-id">' + escHtml(lca2.id) + '</span>'
              + '</div>';
      } else {
        html += '<div class="lca-name">' + escHtml(lcaName) + ' <span class="lca-id">' + escHtml(lca.id) + '</span></div>';
      }

      html += '<div class="lca-paths">';

      if (lca.pathA && lca.pathA.length > 0) {
        var dispA = lca.pathA.slice().reverse();
        html += '<div class="path-row">';
        html += '<span class="path-badge path-badge-a">A · ' + escHtml(nameA) + '</span>';
        html += renderPath(dispA, null, 'A');
        html += '</div>';
      }
      if (lca.pathB && lca.pathB.length > 0) {
        var dispB = lca.pathB.slice().reverse();
        html += '<div class="path-row">';
        html += '<span class="path-badge path-badge-b">B · ' + escHtml(nameB) + '</span>';
        html += renderPath(dispB, null, 'B');
        html += '</div>';
      }

      html += '</div></div>';
    });
  }

  if (result.warnings && result.warnings.length > 0) {
    var uniq = [];
    result.warnings.forEach(function(w) { if (uniq.indexOf(w) === -1) uniq.push(w); });
    html += '<div class="warning-banner"><div class="warn-title">⚠ Cảnh báo dữ liệu</div><ul>';
    uniq.forEach(function(w) { html += '<li>' + escHtml(w) + '</li>'; });
    html += '</ul></div>';
  }

  area.innerHTML = html;
  debugToggle.style.display = result.debug ? 'flex' : 'none';

  if (result.debug) {
    debugJson.innerHTML = highlightJSON(result.debug);
    var lcaLabel = result.debug.LCAs.length > 0 ? result.debug.LCAs[0].name : 'N/A';
    document.getElementById('debugLabel').textContent = 'LCA: ' + lcaLabel 
      + ' · ' + result.debug.relation.type 
      + ' · da=' + result.debug.relation.da 
      + ' db=' + result.debug.relation.db;
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function personLabel(id, people, opts) {
  opts = opts || {};
  var p = people ? people.get(id) : null;
  var name = p ? escHtml(p.name || '(chưa đặt tên)') : escHtml(id);
  var idSpan = '<span class="nid">' + escHtml(id) + '</span>';
  if (opts.large) {
    return name + ' <span class="lca-id">' + escHtml(id) + '</span>';
  }
  return name + idSpan;
}

function escAttr(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

initUI();
</script>
</body>
